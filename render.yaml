services:

  # ── Backend: Flask API ──────────────────────────────────────
  - type: web
    name: digital-chikitsak-backend
    runtime: python
    rootDir: backend/chikitsak-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALG
        value: HS256
      - key: GEMINI_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"

  # ── Frontend: Vite React Static Site ───────────────────────
  - type: static
    name: digital-chikitsak-frontend
    rootDir: frontend/rishu-diital-chikitsak
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        value: chikitsak_unsigned
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
